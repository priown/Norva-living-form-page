<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Norva-living</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="min-h-screen flex items-center justify-center" style="background-color: #e6f1ff">
        <div class="w-full max-w-md p-8 bg-white rounded-2xl shadow-lg flex flex-col items-center">
            <img src="" alt="logo" class="w-12 h-12 mb-4">
            <h1 class="text-2xl font-bold text-center text-gray-800 mb-8">Your journey starts here <br>Take the first step</h1>
            <form class="w-full flex flex-col gap-4">
                <input type="email" placeholder="✉️ E-mail" class="w-full px-5 py-4 rounded-full outline-none" style="background-color: #e6f1ff;">
                <input type="text" placeholder="👤 Username" class="w-full px-5 py-4 rounded-full outline-none" style="background-color: #e6f1ff;">
                <input type="password" placeholder="🔒 Password" class="w-full px-5 py-4 rounded-full outline-none" style="background-color: #e6f1ff;">
                <input type="password" placeholder="🔒 Confirm Password" class="w-full px-5 py-4 rounded-full outline-none" style="background-color: #e6f1ff;">
                <button type="submit" class="w-full py-4 rounded-full text-white font-semibold mt-2" style="background-color: #1e293b">Sign Up</button>
            </form>
            <div class="flex items-center w-full my-6">
                <div class="flex-1 h-px bg-gray-400"></div>
                <span class="px-3 text-gray-500">or</span>
                <div class="flex-1 h-px bg-gray-400"></div>
            </div>

            <div class="flex gap-6 mb-6">
                <a href="#" class="w-10 h-10 rounded-full bg-gray-800 flex items-center justify-center text-white"><img src="images.png" alt=""></a>
                <a href="#" class="w-10 h-10 rounded-full bg-gray-800 flex items-center justify-center text-white"><img src="apple.png" alt=""></a>
                <a href="#" class="w-10 h-10 rounded-full bg-gray-800 flex items-center justify-center text-white"><img src="google.jpeg" alt=""></a>
            </div>

            <p class="text-sm" style="text-shadow: #e6f1ff 1px 1px 2px;">Already have an account? <a href="#" class="underline font-medium">sign In</a></p>
        </div>
    </div>
</body>
</html>
